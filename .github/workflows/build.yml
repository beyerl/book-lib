name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: lspace-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename release APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release-unsigned.apk "dist/lspace-${GITHUB_REF_NAME}-unsigned.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "L-Space ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/lspace-*-unsigned.apk
